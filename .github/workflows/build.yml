on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string
      cachePath:
        required: true
        type: string
      cacheLibrariesPath:
        required: true
        type: string
      exportPath:
        required: true
        type: string

env:
  HAXE_VERSION: 4.3.6
  PROJECT_NAME: PSliceEngine

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}
          
      - name: Set XCode app
        if: inputs.os == 'macos-15'
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Restore Libraries for compilation
        id: load-lib-cache
        uses: actions/cache@v3
        with:
          key: ${{ inputs.cacheLibrariesPath }}
          fail-on-cache-miss: true
          enableCrossOsArchive: true
          path: |
            .haxelib/
          restore-keys: |
            ${{ inputs.cacheLibrariesPath }}

      - name: Restore existing build cache for faster compilation
        id: load-cache
        uses: actions/cache@v3
        with:
          key: ${{ inputs.cachePath }}-${{ github.run_id }}
          path: |
            export/release/${{ inputs.exportPath }}/haxe/
            export/release/${{ inputs.exportPath }}/obj/
          restore-keys: |
            ${{ inputs.cachePath }}-
            cache-build-${{ inputs.exportPath }}

      - name: Install libVLC
        if: inputs.exportPath == 'linux'
        run: sudo apt install libvlc-dev libvlccore-dev

      - name: Configure Android
        if: inputs.exportPath == 'android'
        env:
          PLAYSTORE_FIREBASE: ${{ secrets.PLAYSTORE_FIREBASE }}
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_X64
          haxelib run lime config ANDROID_SETUP true
          printf '%s' "$PLAYSTORE_FIREBASE" > ./setup/google-services.json

      - name: Configure iOS
        if: inputs.name == 'iOS'
        env:
          PLAYSTORE_FIREBASE_IOS: ${{ secrets.PLAYSTORE_FIREBASE_IOS }}
        run: printf '%s' "$PLAYSTORE_FIREBASE_IOS" > ./setup/GoogleService-Info.plist

      # PASO 1: GENERAR PROYECTO BASE DE ANDROID (Mastica el C++)
      - name: Generate Android Build Files
        if: inputs.exportPath == 'android'
        run: haxelib run lime build android -nosign || true

      # PASO 2: CLONAR CARPETA PARA BURLAR A LIME
      - name: Intercept and Copy Build Folder
        if: inputs.exportPath == 'android'
        continue-on-error: true
        run: |
          echo "Haciendo copia de seguridad del proyecto generado..."
          cp -r export/release/android/bin ./android-clean

      # PASO 3: EXTIRPAR EL ARCHIVO EN AMBAS CARPETAS
      - name: Fix Firebase Crashlytics Bug in Both Folders
        if: inputs.exportPath == 'android'
        continue-on-error: true
        run: |
          FILE1="./android-clean/app/build.gradle"
          if [ -f "$FILE1" ]; then
            echo "Mutilando Firebase en copia segura..."
            sed -i '/firebaseCrashlytics\s*{/,/}/d' "$FILE1"
            sed -i '/firebaseCrashlytics/d' "$FILE1"
          fi
          
          FILE2="./export/release/android/bin/app/build.gradle"
          if [ -f "$FILE2" ]; then
            echo "Mutilando Firebase en la carpeta original de Lime..."
            sed -i '/firebaseCrashlytics\s*{/,/}/d' "$FILE2"
            sed -i '/firebaseCrashlytics/d' "$FILE2"
          fi

      # PASO 4: COMPILAR EL APK DIRECTAMENTE DESDE LA CARPETA SEGURA Y CAPTURAR EL ARCHIVO
      - name: Compile APK via Gradle Direct
        if: inputs.exportPath == 'android'
        run: |
          cd android-clean
          chmod +x gradlew
          ./gradlew assembleRelease
          
          mkdir -p ../export/release/android/bin/app/build/outputs/apk/release/
          
          echo "Buscando APK generado..."
          find . -name "*.apk" -type f -exec cp {} ../export/release/android/bin/app/build/outputs/apk/release/PSliceEngine-release.apk \;
          echo "¡Escaner completado! APK posicionado en la ruta de firma."

      # PASO 5: COMPILACIÓN NORMAL (Para PC e iOS)
      - name: Compile
        if: inputs.exportPath != 'android'
        run: haxelib run lime build ${{ inputs.buildArgs }}

      - name: Upload debugging symbols (Android)
        if: inputs.exportPath == 'android' 
        run: sh ./setup/firebase_spell.sh || true 

      - name: Upload debugging symbols (iOS)
        if: inputs.name == 'iOS'
        run: sh ./setup/firebase_ios.sh || true

      # INSTALAMOS JAVA 11 PARA BRINDAR COMPATIBILIDAD AL FIRMADOR
      - name: Setup Java 11 for Signing Compatibility
        if: inputs.exportPath == 'android'
        continue-on-error: true
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      # PASO 6: INTENTAR FIRMAR (Si este paso falla, se ignora el error gracias al continue-on-error)
      - name: Sign APK with the proper key
        if: inputs.exportPath == 'android'
        continue-on-error: true
        env:
          OUT_DIR: ./export/release/android/bin/app/build/outputs/apk/release/
          SIGNING_KEY: ${{ secrets.MIKOLKA_PASSWORD }}
          SIGNING_ALIAS: pslice
          SIGNING_FILE: ${{ secrets.MIKOLKA_KEYSTORE }}
        run: |
          rm -f ./key.keystore;
          echo $SIGNING_FILE | base64 -d > ./key.keystore;
          sha256sum ./key.keystore;

          mv '${{env.OUT_DIR}}PSliceEngine-release.apk' '${{env.OUT_DIR}}PSliceEngine-unsigned.apk';
          
          $ANDROID_HOME/build-tools/35.0.1/zipalign -P 16 -f -v 4 '${{env.OUT_DIR}}PSliceEngine-unsigned.apk' '${{env.OUT_DIR}}PSliceEngine-release.apk' > /dev/null;

          $ANDROID_HOME/build-tools/35.0.1/apksigner sign --ks key.keystore --ks-key-alias $SIGNING_ALIAS --ks-pass "env:SIGNING_KEY" --key-pass "env:SIGNING_KEY" '${{env.OUT_DIR}}PSliceEngine-release.apk';
          rm '${{env.OUT_DIR}}PSliceEngine-unsigned.apk';
          echo "¡Paso de firmado completado de forma nativa!"

      # PASO DE RESPALDO ANTI-FALLOS: Si la firma falló arriba, nos aseguramos de que el APK siga vivo en la ruta de subida
      - name: Ensure APK exists even if signing failed
        if: inputs.exportPath == 'android' && always()
        run: |
          OUT_DIR="./export/release/android/bin/app/build/outputs/apk/release/"
          if [ ! -f "${OUT_DIR}PSliceEngine-release.apk" ]; then
            echo "La firma falló o renombró mal el archivo. Rescatando el APK sin firmar original..."
            find ./android-clean -name "*.apk" -type f -exec cp {} ${OUT_DIR}PSliceEngine-release.apk \;
            echo "¡APK sin firmar rescatado con éxito para MT Manager!"
          fi

      - name: Make IPA
        if: inputs.name == 'iOS'
        run: |
          cd export/release/ios/build/Release-iphoneos
          mkdir Payload
          mv *.app Payload
          zip -r ${{ env.PROJECT_NAME }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}
          if-no-files-found: error    

      # PASO DE LIMPIEZA
      - name: Clearing already existing cache
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key.startsWith("${{ inputs.cachePath }}")) {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }

      # EL SEGURO DE VIDA BLINDADO (Ahora sí guardará el caché de C++ pase lo que pase)
      - name: Uploading new cache
        if: always()
        uses: actions/cache@v3
        with:
          key: ${{ inputs.cachePath }}
          path: |
            export/release/${{ inputs.exportPath }}/haxe/
            export/release/${{ inputs.exportPath }}/obj/
          restore-keys: |
            ${{ inputs.cachePath }}
            
