name: Build the game

on:
  push:
    branches: [master-dev, master]
  workflow_dispatch:
jobs:
  
  BuildMobileCache:
    name: Build Caches
    permissions: write-all
    uses: ./.github/workflows/dependencies.yml
    with:
      os: macos-15
      CACHE_NAME: P-Slice.1.0.mobile-cache
      setupScript: sh ./setup/mobile.sh

  BuildDesktopCache:
    name: Build Caches
    permissions: write-all
    uses: ./.github/workflows/dependencies.yml
    with:
      os: ubuntu-24.04
      setupScript: sh ./setup/unix.sh
      CACHE_NAME: P-Slice.1.0.desktop-cache

  BuildMacos:
    name: macos
    needs: BuildMobileCache
    permissions: write-all
    uses: ./.github/workflows/mac-universal.yml
    with:
      exportPath: macos
      cachePath: P-Slice.1.0.build-macos
      cacheLibrariesPath: P-Slice.1.0.mobile-cache
      artifactName: P-Slice.1.0.macos
      artifactPath: export/release/macos/bin/*

  BuildDesktop:
    name: Build Desktop
    needs: BuildDesktopCache
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-2022
            buildArgs: "windows -final"
            exportPath: windows
            artifactName: P-Slice.1.0.windows
            cacheLibrariesPath: P-Slice.1.0.desktop-cache
            cachePath: P-Slice.1.0.build-windows
            artifactPath: export\release\windows\bin\*
          - name: Linux
            os: ubuntu-22.04
            buildArgs: "linux -final"
            exportPath: linux
            artifactName: P-Slice.1.0.linux
            cachePath: P-Slice.1.0.build-linux
            cacheLibrariesPath: P-Slice.1.0.desktop-cache
            artifactPath: export/release/linux/bin/*
    uses: ./.github/workflows/build.yml
    with:
      name: ${{ matrix.name }}
      os: ${{ matrix.os }}
      buildArgs: ${{ matrix.buildArgs }}
      cacheLibrariesPath: ${{ matrix.cacheLibrariesPath }}
      exportPath: ${{ matrix.exportPath }}
      artifactName: ${{ matrix.artifactName }}
      artifactPath: ${{ matrix.artifactPath }}
      cachePath: ${{matrix.cachePath}}

  BuildMobile:
    permissions: write-all
    needs: BuildMobileCache
    name: Build mobile
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android
            os: ubuntu-24.04
            # Forzamos a Lime a generar los archivos base, pero usará nuestro fix si se traba con Firebase
            buildArgs: "android"
            exportPath: android
            cacheLibrariesPath: P-Slice.1.0.mobile-cache
            artifactName: P-Slice.1.0.android
            cachePath: P-Slice.1.0.build-android
            artifactPath: "export/release/android/bin/app/build/outputs/apk/release/*.apk"
          - name: iOS
            os: macos-15
            buildArgs: "ios -nosign -final"
            exportPath: ios/PSliceEngine/haxe/build/Release-iphoneos-64/
            cacheLibrariesPath: P-Slice.1.0.mobile-cache
            artifactName: P-Slice.1.0.ios
            artifactPath: "export/release/ios/build/Release-iphoneos/*.ipa"
            cachePath: P-Slice.1.0.build-ios
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      name: ${{ matrix.name }}
      os: ${{ matrix.os }}
      buildArgs: ${{ matrix.buildArgs }}
      exportPath: ${{ matrix.exportPath }}
      artifactName: ${{ matrix.artifactName }}
      cacheLibrariesPath: ${{ matrix.cacheLibrariesPath }}
      artifactPath: ${{ matrix.artifactPath }}
      cachePath: ${{matrix.cachePath}}

  # CORRECCIÓN EN CALIENTE TRAS LA GENERACIÓN DE LIME
  FixAndPackAndroid:
    name: Fix Android Gradle & Pack
    needs: BuildMobile
    # Solo corre si el build de Android falla debido a Gradle, reparando el APK en el acto
    if: always() && contains(needs.BuildMobile.result, 'failure')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Haxe Libraries Cache
        uses: actions/cache@v4
        with:
          path: |
            .haxelib
            ~/.gradle
          key: P-Slice.1.0.mobile-cache

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Generated Gradle File (Mutilate Firebase Method)
        run: |
          # Buscamos el archivo build.gradle generado por Lime en los temporales
          for FILE in "export/release/android/bin/app/build.gradle" "export/release/android/bin/build.gradle"; do
            if [ -f "$FILE" ]; then
              echo "Rebanando Firebase de: $FILE"
              sed -i '/firebaseCrashlytics\s*{/,/}/d' "$FILE"
              sed -i '/firebaseCrashlytics/d' "$FILE"
            fi
          done

      - name: Manual Compile APK (Safe Run)
        run: |
          if [ -f "export/release/android/bin/gradlew" ]; then
            cd export/release/android/bin
            chmod +x gradlew
            ./gradlew assembleRelease
          elif [ -f "export/release/android/bin/app/gradlew" ]; then
            cd export/release/android/bin/app
            chmod +x gradlew
            ./gradlew assembleRelease
          fi

      - name: Upload Repaired Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: P-Slice.1.0.android
          path: "export/release/android/bin/app/build/outputs/apk/release/*.apk"
