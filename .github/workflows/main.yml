name: Build the game

on:
  push:
    branches: [master-dev, master]
  workflow_dispatch:
jobs:
  
  BuildMobileCache:
    name: Build Caches
    permissions: write-all
    uses: ./.github/workflows/dependencies.yml
    with:
      os: macos-15
      CACHE_NAME: P-Slice.1.0.mobile-cache
      setupScript: sh ./setup/mobile.sh

  BuildDesktopCache:
    name: Build Caches
    permissions: write-all
    uses: ./.github/workflows/dependencies.yml
    with:
      os: ubuntu-24.04
      setupScript: sh ./setup/unix.sh
      CACHE_NAME: P-Slice.1.0.desktop-cache

  BuildMacos:
    name: macos
    needs: BuildMobileCache
    permissions: write-all
    uses: ./.github/workflows/mac-universal.yml
    with:
      exportPath: macos
      cachePath: P-Slice.1.0.build-macos
      cacheLibrariesPath: P-Slice.1.0.mobile-cache
      artifactName: P-Slice.1.0.macos
      artifactPath: export/release/macos/bin/*

  BuildDesktop:
    name: Build Desktop
    needs: BuildDesktopCache
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-2022
            buildArgs: "windows -final"
            exportPath: windows
            artifactName: P-Slice.1.0.windows
            cacheLibrariesPath: P-Slice.1.0.desktop-cache
            cachePath: P-Slice.1.0.build-windows
            artifactPath: export\release\windows\bin\*
          - name: Linux
            os: ubuntu-22-04
            buildArgs: "linux -final"
            exportPath: linux
            artifactName: P-Slice.1.0.linux
            cachePath: P-Slice.1.0.build-linux
            cacheLibrariesPath: P-Slice.1.0.desktop-cache
            artifactPath: export/release/linux/bin/*
    uses: ./.github/workflows/build.yml
    with:
      name: ${{ matrix.name }}
      os: ${{ matrix.os }}
      buildArgs: ${{ matrix.buildArgs }}
      cacheLibrariesPath: ${{ matrix.cacheLibrariesPath }}
      exportPath: ${{ matrix.exportPath }}
      artifactName: ${{ matrix.artifactName }}
      artifactPath: ${{ matrix.artifactPath }}
      cachePath: ${{matrix.cachePath}}

  BuildMobile:
    permissions: write-all
    needs: BuildMobileCache
    name: Build mobile
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android
            os: ubuntu-24.04
            exportPath: android
            buildArgs: "android"
            cacheLibrariesPath: P-Slice.1.0.mobile-cache
            artifactName: P-Slice.1.0.android
            cachePath: P-Slice.1.0.build-android
            artifactPath: "export/release/android/bin/app/build/outputs/apk/release/*.apk"
          - name: iOS
            os: macos-15
            buildArgs: "ios -nosign -final"
            exportPath: ios/PSliceEngine/haxe/build/Release-iphoneos-64/
            cacheLibrariesPath: P-Slice.1.0.mobile-cache
            artifactName: P-Slice.1.0.ios
            artifactPath: "export/release/ios/build/Release-iphoneos/*.ipa"
            cachePath: P-Slice.1.0.build-ios

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java JDK
        if: matrix.name == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Restore Haxe Libraries Cache
        uses: actions/cache@v4
        with:
          path: |
            .haxelib
            ~/.gradle
          key: ${{ matrix.cacheLibrariesPath }}

      - name: Run Setup Script (Install Lime and Deps)
        run: |
          chmod +x ./setup/mobile.sh
          sh ./setup/mobile.sh

      - name: Configure Lime Android SDK Routes
        if: matrix.name == 'Android'
        run: |
          # Le decimos a Lime exactamente dónde están las herramientas en el servidor de GitHub
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          echo "Rutas de Android vinculadas con éxito."

      - name: Restore C++ Compilation Cache
        uses: actions/cache@v4
        with:
          path: export/release/${{ matrix.exportPath }}/haxe
          key: ${{ matrix.cachePath }}-${{ github.run_id }}
          restore-keys: |
            ${{ matrix.cachePath }}-

      - name: Install Missing Tools
        run: |
          haxelib dev extension-androidtools .haxelib/extension-androidtools/git || true

      - name: Fix Source Project XML (Pre-clean Firebase)
        run: |
          if [ -f "Project.xml" ]; then
            sed -i 's/<define name="FIREBASE_CRASH_HANDLER"[^>]*\/>//' Project.xml
          fi

      - name: Build Game C++ and Gradle Project
        run: |
          haxelib run lime build ${{ matrix.buildArgs }} -nosign || true

      - name: Fix Generated Gradle File (Remove Firebase Method)
        if: matrix.name == 'Android'
        run: |
          for FILE in "export/release/android/bin/app/build.gradle" "export/release/android/bin/build.gradle"; do
            if [ -f "$FILE" ]; then
              echo "Limpiando rastro de Firebase en: $FILE"
              sed -i '/firebaseCrashlytics\s*{/,/}/d' "$FILE"
              sed -i '/firebaseCrashlytics/d' "$FILE"
            fi
          done

      - name: Compile APK / IPA Final
        run: |
          if [ "${{ matrix.name }}" = "Android" ]; then
            if [ -f "export/release/android/bin/gradlew" ]; then
              cd export/release/android/bin
              chmod +x gradlew
              ./gradlew assembleRelease
            elif [ -f "export/release/android/bin/app/gradlew" ]; then
              cd export/release/android/bin/app
              chmod +x gradlew
              ./gradlew assembleRelease
            else
              echo "Ruta manual no encontrada, forzando compilación limpia por Lime..."
              haxelib run lime build android -nosign
            fi
          else
            echo "Saltando empaquetado manual para iOS..."
          fi

      - name: Save C++ Cache (Forced Always)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: export/release/${{ matrix.exportPath }}/haxe
          key: ${{ matrix.cachePath }}-${{ github.run_id }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
